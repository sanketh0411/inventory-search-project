services:
  # 🔙 Backend (Node.js API)
  - type: web
    name: inventory-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js

  # 🔜 Frontend (React App)
  - type: web
    name: inventory-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build